version: 2

builds:
  - main: ./cmd/sshq
    binary: sshq
    ldflags:
      - -s -w
      - -X github.com/shayuc137/sshq/internal/version.Version={{.Version}}
      - -X github.com/shayuc137/sshq/internal/version.Commit={{.ShortCommit}}
      - -X github.com/shayuc137/sshq/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
